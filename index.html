<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veyant — AI Travel Orchestration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#2563EB',
            success: '#10B981',
            warning: '#F59E0B',
            shell: '#0F172A',
            card: '#1E293B',
            'card-border': '#334155',
            'text-primary': '#F8FAFC',
            'text-secondary': '#94A3B8',
          },
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #0F172A; font-family: 'DM Sans', sans-serif; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeSlideRight {
      from { opacity: 0; transform: translateX(10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .msg-enter       { animation: fadeSlideIn 0.35s ease both; }
    .msg-enter-right { animation: fadeSlideRight 0.35s ease both; }
    .fade-in         { animation: fadeIn 0.4s ease both; }
    .card-slide      { animation: fadeSlideIn 0.45s cubic-bezier(0.16,1,0.3,1) both; }
    .pulse-dot       { animation: pulse-dot 1.2s ease infinite; }

    .tag {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 0.04em;
      margin-right: 6px;
      vertical-align: middle;
      white-space: nowrap;
    }
    .tag-calendar { background: #1e3a5f; color: #60a5fa; }
    .tag-brain    { background: #1e2d5a; color: #818cf8; border: 1px solid #3730a3; }
    .tag-bridge   { background: #1a3a2a; color: #34d399; border: 1px solid #065f46; }
    .tag-veyant   { background: #1e3a5f; color: #60a5fa; border: 1px solid #1d4ed8; }

    .strikethrough { text-decoration: line-through; opacity: 0.45; }

    .approve-btn {
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
      transition: all 0.2s ease;
    }
    .approve-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(16,185,129,0.35);
    }
    .approve-btn:active { transform: translateY(0); }

    .scrollbar-thin::-webkit-scrollbar { width: 4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

    .compliant-badge {
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.35);
      color: #10B981;
    }
    .option-card { border: 1px solid #334155; transition: border-color 0.2s; }
    .option-card.recommended { border-color: rgba(37,99,235,0.5); }
    .confirmed-badge { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3); }

    /* Chat bubbles */
    .bubble-user {
      background: linear-gradient(135deg, #2563EB 0%, #1d4ed8 100%);
      color: #fff;
      border-radius: 16px 16px 4px 16px;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.5;
      max-width: 88%;
    }
    .bubble-veyant {
      background: #1E293B;
      border: 1px solid #334155;
      color: #F8FAFC;
      border-radius: 16px 16px 16px 4px;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.5;
      max-width: 88%;
    }
    .process-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 3px 0 3px 12px;
      border-left: 2px solid #1e293b;
      margin-left: 4px;
    }

    /* Scenario tabs */
    .scenario-tab {
      font-size: 12px;
      padding: 5px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .scenario-tab.active {
      background: rgba(37,99,235,0.15);
      border-color: rgba(37,99,235,0.4);
      color: #93c5fd;
    }
    .scenario-tab.inactive {
      color: #64748b;
      border-color: #1e293b;
    }
    .scenario-tab.inactive:hover { color: #94a3b8; border-color: #334155; }

    /* Trip card in S2 */
    .trip-card {
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
      background: #0f172a;
      transition: border-color 0.3s;
    }
    .trip-card.confirmed { border-color: rgba(16,185,129,0.4); background: rgba(16,185,129,0.04); }

    /* Mobile panel toggle tab bar */
    .mobile-tab {
      flex: 1;
      padding: 9px 4px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      text-align: center;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      border-bottom: 2px solid transparent;
      letter-spacing: 0.04em;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }
    .mobile-tab.active  { color: #2563EB; border-bottom-color: #2563EB; }
    .mobile-tab.inactive { color: #64748b; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─────────────────────────────────────────────────────────────────────────────
// SCENARIO 1 DATA  (unchanged)
// ─────────────────────────────────────────────────────────────────────────────
const S1_STEPS = [
  { delay: 800,   type: 'calendar', text: 'London client meeting extended — now Wednesday Sept 18, not Tuesday Sept 17', time: '8:02 AM' },
  { delay: 2200,  type: 'brain',    text: 'Analyzing trip context for Sarah Chen…' },
  { delay: 3000,  type: 'brain',    text: 'Checking British Airways Club Gold status — flight change fee: $0' },
  { delay: 3900,  type: 'brain',    text: 'Checking Marriott Platinum status — complimentary room upgrade + Executive Lounge access applied' },
  { delay: 4900,  type: 'brain',    text: 'Reviewing Acme Corp travel policy — max hotel $350/night, London exception $420/night' },
  { delay: 5800,  type: 'brain',    text: 'Checking calendar — Wednesday has no conflicts' },
  { delay: 6700,  type: 'brain',    text: 'Preference match: window seat ✓, non-stop preferred ✓, Marriott preferred ✓' },
  { delay: 7800,  type: 'bridge',   text: 'Searching British Airways — London Heathrow departures Wednesday Sept 18…' },
  { delay: 9000,  type: 'bridge',   text: 'Extending Marriott London Park Lane — checking availability…' },
  { delay: 10400, type: 'bridge',   text: '3 compliant options found. Preparing recommendation…' },
  { delay: 11200, type: 'show_rec' },
];

// ─────────────────────────────────────────────────────────────────────────────
// SCENARIO 2 DATA
// ─────────────────────────────────────────────────────────────────────────────
const S2_PREFILL = 'Please extend my London trip one day for extra meetings, and add a NYC stop to meet with a client with an escalated issue. Please get me same room, best seats and upgrades.';

// Steps that fire AFTER Sarah sends her message (delays relative to send time)
const S2_STEPS_AFTER_SEND = [
  { delay: 800,   type: 'veyant_msg',  text: 'On it. Reviewing your full trip context now…' },
  { delay: 1600,  type: 'brain',       text: 'Parsing request: London extension + NYC stopover + preference preservation' },
  { delay: 2400,  type: 'brain',       text: 'Checking Marriott London Park Lane availability — Wednesday Sept 18 open, same room confirmed' },
  { delay: 3200,  type: 'brain',       text: 'Corporate rate $385/night — within Acme Corp London exception policy' },
  { delay: 4100,  type: 'brain',       text: 'Checking Delta Platinum + BA Club Gold status — business class upgrade on LHR-JFK eligible with 25K miles · AA87 complimentary upgrade eligible (oneworld alliance)' },
  { delay: 5000,  type: 'brain',       text: 'Searching DL401 LHR-JFK Wednesday Sept 18 10:15am — seats available' },
  { delay: 5900,  type: 'brain',       text: 'NYC overnight: checking Marriott Midtown — corporate rate $289/night, within policy' },
  { delay: 6800,  type: 'brain',       text: 'Thursday return JFK-BOS: checking availability — non-stop confirmed' },
  { delay: 7600,  type: 'brain',       text: 'Total cost impact calculated — within Acme Corp approval threshold, no manager approval needed' },
  { delay: 8600,  type: 'bridge',      text: 'Extending Marriott London Park Lane — Wednesday confirmed · same room · $385/night corporate rate · Executive Lounge included · change fee: $0 (Marriott Platinum)' },
  { delay: 9600,  type: 'bridge',      text: 'Booking DL401 LHR-JFK Wednesday 10:15am — Business Class upgrade confirmed · 25,000 Delta miles applied · flight change fee: $0 (Delta Platinum + BA Club Gold)' },
  { delay: 10600, type: 'bridge',      text: 'Booking Marriott New York Midtown — Thursday Sept 19, corporate rate applied' },
  { delay: 11500, type: 'bridge',      text: 'Booking AA87 JFK-BOS Thursday Sept 19 6:30pm — complimentary First Class upgrade applied · BA Club Gold / oneworld alliance benefit · seat 2A confirmed' },
  { delay: 12300, type: 'bridge',      text: 'Lounge access confirmed at LHR Terminal 2 — SkyTeam Platinum benefit' },
  { delay: 13100, type: 'show_rec2' },
  { delay: 13700, type: 'veyant_msg',  text: 'Done. Review your modified itinerary in the Travel Cockpit. Let me know if that works or if you need anything changed.' },
  { delay: 15400, type: 'user_msg',    text: 'Perfect. Can you add a lounge pass and prepay my overweight bag on the way home?' },
  { delay: 16600, type: 'veyant_msg',  text: 'Done. Lounge pass added at JFK Terminal 8 and overweight bag prepaid for AA87. Your SkyTeam Platinum status earned you a discount on both — saved you $47.' },
  { delay: 17600, type: 'show_approve2' },
];

// ─────────────────────────────────────────────────────────────────────────────
// SHARED: Tag
// ─────────────────────────────────────────────────────────────────────────────
function Tag({ type }) {
  const map = {
    calendar: ['CALENDAR', 'tag-calendar'],
    brain:    ['BRAIN',    'tag-brain'],
    bridge:   ['BRIDGE',   'tag-bridge'],
    veyant:   ['VEYANT',   'tag-veyant'],
  };
  const [label, cls] = map[type] || ['INFO', 'tag-calendar'];
  return <span className={`tag ${cls}`}>{label}</span>;
}

// ─────────────────────────────────────────────────────────────────────────────
// SCENARIO 1 — Left Panel (notification feed)
// ─────────────────────────────────────────────────────────────────────────────
function S1FeedMessage({ msg }) {
  const isMono = msg.type === 'brain' || msg.type === 'bridge';
  return (
    <div className="msg-enter flex gap-2 py-2.5 border-b border-slate-800 last:border-0">
      <div className="flex-1 min-w-0">
        <div className="flex items-start gap-1 flex-wrap">
          <Tag type={msg.type} />
          <span className={`text-sm leading-relaxed ${isMono ? 'text-xs text-text-secondary' : 'text-text-primary'}`}
                style={{ fontFamily: isMono ? "'JetBrains Mono', monospace" : undefined }}>
            {msg.text}
          </span>
        </div>
        {msg.time && (
          <div className="text-xs text-text-secondary mt-1 ml-1" style={{ fontFamily: "'JetBrains Mono', monospace" }}>
            {msg.time}
          </div>
        )}
      </div>
    </div>
  );
}

function LeftPanelS1({ messages, running, confirmed }) {
  const bottomRef = useRef(null);
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, confirmed]);

  return (
    <div className="flex flex-col h-full">
      <div className="px-5 py-4 border-b border-card-border flex items-center justify-between">
        <div>
          <div className="text-xs font-mono text-text-secondary uppercase tracking-widest mb-0.5">Activity Feed</div>
          <div className="text-base font-medium text-text-primary">Sarah Chen · BOS ↔ LHR</div>
        </div>
        {running && !confirmed && (
          <div className="flex items-center gap-1.5 text-warning text-xs font-mono">
            <span className="pulse-dot w-1.5 h-1.5 rounded-full bg-warning inline-block" />
            Processing
          </div>
        )}
        {confirmed && (
          <div className="flex items-center gap-1.5 text-success text-xs font-mono fade-in">
            <span className="w-1.5 h-1.5 rounded-full bg-success inline-block" />
            Confirmed
          </div>
        )}
      </div>

      <div className="flex-1 overflow-y-auto scrollbar-thin px-5 py-3">
        {messages.length === 0 && (
          <div className="text-text-secondary text-sm text-center mt-16 opacity-50">
            Press <span className="font-mono text-xs bg-slate-800 px-1.5 py-0.5 rounded">Run Demo</span> to begin
          </div>
        )}
        {messages.map((msg, i) => <S1FeedMessage key={i} msg={msg} />)}
        {confirmed && (
          <div className="msg-enter mt-2 py-3 border-b border-slate-800">
            <div className="flex items-start gap-1 flex-wrap">
              <Tag type="veyant" />
              <span className="text-sm text-text-primary">Changes confirmed. Calendar updated. Sarah, your trip is set.</span>
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>

      {confirmed && (
        <div className="px-5 py-3 border-t border-card-border fade-in">
          <div className="text-xs text-text-secondary">
            Resolved in <span className="text-success font-medium">~90 seconds</span>{' '}
            vs estimated <span className="text-text-primary font-medium">35 minutes</span> manually
          </div>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// SCENARIO 1 — Right Panel
// ─────────────────────────────────────────────────────────────────────────────
function S1CurrentTrip({ crossed }) {
  const rowCls = crossed ? 'strikethrough text-text-secondary' : 'text-text-primary';
  return (
    <div className={`space-y-4 transition-all duration-500 ${crossed ? 'opacity-40' : ''}`}>
      <div className="text-xs font-mono text-text-secondary uppercase tracking-widest mb-3">Current Itinerary</div>
      <div className="option-card rounded-xl p-4 bg-slate-900/60">
        <div className="flex items-center justify-between mb-2">
          <span className="text-xs font-mono text-text-secondary">OUTBOUND</span>
          <span className="text-xs text-text-secondary">Sat Sept 14</span>
        </div>
        <div className={`font-medium text-sm ${rowCls}`}>BA 173 · BOS → LHR</div>
        <div className="text-xs text-text-secondary mt-1">9:15 PM · Seat 12A · Premium Economy</div>
      </div>
      <div className={`option-card rounded-xl p-4 bg-slate-900/60 ${crossed ? 'border-red-900/40' : ''}`}>
        <div className="flex items-center justify-between mb-2">
          <span className="text-xs font-mono text-text-secondary">RETURN</span>
          <span className={`text-xs ${crossed ? 'text-red-400' : 'text-text-secondary'}`}>
            {crossed ? '⚠ Needs change' : 'Tue Sept 17'}
          </span>
        </div>
        <div className={`font-medium text-sm ${rowCls}`}>BA 178 · LHR → BOS</div>
        <div className="text-xs text-text-secondary mt-1">11:10 AM · Seat 32A Window</div>
      </div>
      <div className={`option-card rounded-xl p-4 bg-slate-900/60 ${crossed ? 'border-red-900/40' : ''}`}>
        <div className="flex items-center justify-between mb-2">
          <span className="text-xs font-mono text-text-secondary">HOTEL</span>
          <span className={`text-xs ${crossed ? 'text-red-400' : 'text-text-secondary'}`}>
            {crossed ? '⚠ Check-out conflict' : 'Sept 14–17'}
          </span>
        </div>
        <div className={`font-medium text-sm ${rowCls}`}>Marriott London Park Lane</div>
        <div className="text-xs text-text-secondary mt-1">$385/night · 3 nights · Platinum benefits</div>
      </div>
    </div>
  );
}

function S1RecommendedChanges({ onApprove, approved }) {
  const [selected, setSelected] = useState('A');
  return (
    <div className="card-slide space-y-4">
      <div className="text-xs font-mono text-text-secondary uppercase tracking-widest mb-1">Recommended Changes</div>

      {/* Option A */}
      <div className={`option-card recommended rounded-xl p-4 cursor-pointer transition-all ${selected === 'A' ? 'bg-blue-950/40' : 'bg-slate-900/60'}`}
           onClick={() => !approved && setSelected('A')}>
        <div className="flex items-center justify-between mb-3">
          <div className="flex items-center gap-2">
            <span className="text-xs font-semibold text-brand font-mono">OPTION A</span>
            <span className="text-xs bg-blue-950 text-blue-300 border border-blue-800 rounded px-2 py-0.5">Recommended</span>
          </div>
          {selected === 'A' && !approved && (
            <span className="w-4 h-4 rounded-full bg-brand flex items-center justify-center">
              <span className="w-2 h-2 rounded-full bg-white inline-block" />
            </span>
          )}
          {approved && selected === 'A' && <span className="text-xs text-success font-mono">✓ Confirmed</span>}
        </div>

        <div className={`rounded-lg p-3 mb-2 ${approved ? 'confirmed-badge' : 'bg-slate-800/60'}`}>
          <div className="flex justify-between items-start">
            <div>
              <div className="text-sm font-medium text-text-primary">BA 178 · LHR → BOS</div>
              <div className="text-xs text-text-secondary mt-0.5">Wed Sept 18 · 11:10 AM · Seat 32A Window ✓</div>
            </div>
            {approved && <span className="text-success text-xs">✓</span>}
          </div>
          <div className="flex items-center gap-1.5 mt-2">
            <span className="text-xs text-success font-mono">Change fee: $0</span>
            <span className="text-text-secondary text-xs">·</span>
            <span className="text-xs text-text-secondary">British Airways Club Gold waiver</span>
          </div>
        </div>

        <div className={`rounded-lg p-3 mb-2 ${approved ? 'confirmed-badge' : 'bg-slate-800/60'}`}>
          <div className="flex justify-between items-start">
            <div>
              <div className="text-sm font-medium text-text-primary">Marriott London Park Lane</div>
              <div className="text-xs text-text-secondary mt-0.5">Extended to Wed Sept 18 · +1 night · Upgraded room · Executive Lounge</div>
            </div>
            {approved && <span className="text-success text-xs">✓</span>}
          </div>
          <div className="flex items-center gap-1.5 mt-2 flex-wrap">
            <span className="text-xs text-warning font-mono">$350 / night</span>
            <span className="text-text-secondary text-xs">·</span>
            <span className="text-xs text-success">Room upgrade applied</span>
            <span className="text-text-secondary text-xs">·</span>
            <span className="text-xs text-success">Executive Lounge included</span>
          </div>
        </div>

        <div className="flex items-center justify-between mt-3 flex-wrap gap-2">
          <span className="compliant-badge text-xs font-mono px-2.5 py-1 rounded-md">✓ POLICY COMPLIANT</span>
          <span className="text-sm font-semibold text-success">$0 out-of-pocket</span>
        </div>
      </div>

      {/* Option B */}
      <div className={`option-card rounded-xl p-4 cursor-pointer transition-all ${selected === 'B' ? 'bg-slate-800' : 'bg-slate-900/40'}`}
           onClick={() => !approved && setSelected('B')}>
        <div className="flex items-center justify-between mb-3">
          <div className="flex items-center gap-2">
            <span className="text-xs font-semibold text-text-secondary font-mono">OPTION B</span>
            <span className="text-xs text-text-secondary">Budget / Earlier</span>
          </div>
          {selected === 'B' && !approved && (
            <span className="w-4 h-4 rounded-full bg-brand flex items-center justify-center">
              <span className="w-2 h-2 rounded-full bg-white inline-block" />
            </span>
          )}
        </div>
        <div className="text-sm text-text-secondary">BA 176 · LHR → BOS · Wed Sept 18 · 7:45 AM</div>
        <div className="text-xs text-text-secondary mt-1">Earlier departure · Middle seat only · Same hotel &amp; cost</div>
      </div>

      {!approved && (
        <div className="fade-in pt-1">
          <button className="approve-btn w-full text-white font-semibold py-3 rounded-xl text-sm"
                  onClick={() => onApprove(selected)}>
            Approve Option {selected} →
          </button>
          <div className="text-center mt-2">
            <span className="text-xs text-text-secondary cursor-pointer hover:text-text-primary transition-colors">
              Review all options
            </span>
          </div>
        </div>
      )}
      {approved && (
        <div className="fade-in rounded-xl p-4 bg-success/10 border border-success/30 text-center">
          <div className="text-success font-semibold text-sm mb-1">Changes Confirmed</div>
          <div className="text-xs text-text-secondary">Calendar synced · Confirmations sent to sarah.chen@acmecorp.com</div>
        </div>
      )}
    </div>
  );
}

function RightPanelS1({ showRec, approved, onApprove }) {
  return (
    <div className="flex flex-col h-full">
      <div className="px-5 py-4 border-b border-card-border flex items-center justify-between">
        <div>
          <div className="text-xs font-mono text-text-secondary uppercase tracking-widest mb-0.5">Trip Cockpit</div>
          <div className="text-base font-medium text-text-primary">London · Sept 14–18</div>
        </div>
        <div className="text-right hidden sm:block">
          <div className="text-xs text-text-secondary font-mono">Acme Corp</div>
          <div className="text-xs text-text-secondary mt-0.5">Marriott Bonvoy Platinum · BA Club Gold</div>
        </div>
      </div>
      <div className="flex-1 overflow-y-auto scrollbar-thin px-5 py-4">
        {!showRec ? (
          <S1CurrentTrip crossed={false} />
        ) : (
          <div className="space-y-6">
            <S1CurrentTrip crossed={true} />
            <div className="border-t border-dashed border-slate-700 pt-5">
              <S1RecommendedChanges onApprove={onApprove} approved={approved} />
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// SCENARIO 2 — Left Panel (chat interface)
// ─────────────────────────────────────────────────────────────────────────────
function S2ChatItem({ item }) {
  if (item.type === 'user_msg') {
    return (
      <div className="msg-enter-right flex justify-end mb-3">
        <div>
          <div className="bubble-user">{item.text}</div>
          <div className="text-right text-xs text-text-secondary mt-1 mr-1" style={{ fontFamily: "'JetBrains Mono', monospace" }}>
            Sarah Chen
          </div>
        </div>
      </div>
    );
  }
  if (item.type === 'veyant_msg') {
    return (
      <div className="msg-enter flex justify-start mb-3">
        <div>
          <div className="text-xs font-mono text-text-secondary mb-1.5 ml-1 flex items-center gap-1.5">
            <span className="w-1.5 h-1.5 rounded-full bg-brand inline-block" />
            Veyant
          </div>
          <div className="bubble-veyant">{item.text}</div>
        </div>
      </div>
    );
  }
  if (item.type === 'brain' || item.type === 'bridge') {
    return (
      <div className="msg-enter process-row mb-1">
        <Tag type={item.type} />
        <span className="text-xs text-text-secondary leading-relaxed"
              style={{ fontFamily: "'JetBrains Mono', monospace" }}>
          {item.text}
        </span>
      </div>
    );
  }
  return null;
}

function LeftPanelS2({ items, running, confirmed, onSend, inputText, setInputText, chatSent }) {
  const bottomRef = useRef(null);
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [items, confirmed]);

  return (
    <div className="flex flex-col h-full">
      <div className="px-5 py-4 border-b border-card-border flex items-center justify-between">
        <div>
          <div className="text-xs font-mono text-text-secondary uppercase tracking-widest mb-0.5">Chat</div>
          <div className="text-base font-medium text-text-primary">Sarah Chen · NYC Stopover</div>
        </div>
        {running && !confirmed && (
          <div className="flex items-center gap-1.5 text-warning text-xs font-mono">
            <span className="pulse-dot w-1.5 h-1.5 rounded-full bg-warning inline-block" />

        {confirmed && (
          <div className="flex items-center gap-1.5 text-success text-xs font-mono fade-in">
            <span className="w-1.5 h-1.5 rounded-full bg-success inline-block" />
            Confirmed
          </div>
        )}
      </div>

      <div className="flex-1 overflow-y-auto scrollbar-thin px-4 py-4">
        {items.length === 0 && (
          <div className="text-text-secondary text-sm text-center mt-12 opacity-50 px-4">
            Edit or send the pre-filled message below to begin
          </div>
        )}
        {items.map((item, i) => <S2ChatItem key={i} item={item} />)}
        {confirmed && (
          <div className="msg-enter flex justify-start mb-3">
            <div>
              <div className="text-xs font-mono text-text-secondary mb-1.5 ml-1 flex items-center gap-1.5">
                <span className="w-1.5 h-1.5 rounded-full bg-success inline-block" />
                Veyant
              </div>
              <div className="bubble-veyant">All changes confirmed. Calendar updated. Safe travels, Sarah.</div>
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>

      {confirmed && (
        <div className="px-5 py-3 border-t border-card-border fade-in">
          <div className="text-xs text-text-secondary">
            4 changes completed in <span className="text-success font-medium">~90 seconds</span>.{' '}
            Estimated manual time: <span className="text-text-primary font-medium">45+ minutes</span>.
          </div>
        </div>
      )}

      {/* Chat input — shown until message is sent */}
      {!chatSent && !confirmed && (
        <div className="px-4 pb-4 pt-3 border-t border-card-border flex-shrink-0">
          <div className="flex items-center gap-2 mb-1.5">
            <div className="w-5 h-5 rounded-full bg-brand/20 border border-brand/40 flex items-center justify-center flex-shrink-0">
              <span className="text-xs text-blue-300 font-semibold" style={{ fontSize: 9 }}>SC</span>
            </div>
            <span className="text-xs text-text-secondary font-mono">Sarah Chen</span>
          </div>
          <div className="relative">
            <textarea
              value={inputText}
              onChange={e => setInputText(e.target.value)}
              onKeyDown={e => {
                if (e.key === 'Enter' && !e.shiftKey) {
                  e.preventDefault();
                  if (inputText.trim()) onSend(inputText.trim());
                }
              }}
              rows={3}
              className="w-full rounded-xl px-4 py-3 pr-11 text-sm text-text-primary resize-none focus:outline-none transition-colors"
              style={{
                background: '#0f172a',
                border: '1px solid #334155',
                fontFamily: "'DM Sans', sans-serif",
                lineHeight: '1.5',
              }}
              onFocus={e => e.target.style.borderColor = '#2563EB'}
              onBlur={e => e.target.style.borderColor = '#334155'}
            />
            <button
              onClick={() => { if (inputText.trim()) onSend(inputText.trim()); }}
              disabled={!inputText.trim()}
              title="Send (Enter)"
              className="absolute right-2.5 bottom-2.5 w-7 h-7 rounded-lg flex items-center justify-center transition-all"
              style={{ background: inputText.trim() ? '#2563EB' : '#1e293b', cursor: inputText.trim() ? 'pointer' : 'default' }}
            >
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <path d="M1.5 6.5H11.5M11.5 6.5L7 2M11.5 6.5L7 11" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
          </div>
          <div className="text-xs text-text-secondary mt-1.5 opacity-50">Enter to send · Shift+Enter for new line</div>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────────────────────────────────────
function App() {
  const [scenario, setScenario] = useState(1);
  const [mobilePanel, setMobilePanel] = useState('left');

  // S1 state
  const [s1Messages, setS1Messages] = useState([]);
  const [s1ShowRec, setS1ShowRec] = useState(false);
  const [s1Approved, setS1Approved] = useState(false);

  // S2 state
  const [s2Items, setS2Items] = useState([]);
  const [s2ShowRec, setS2ShowRec] = useState(false);
  const [s2ShowApprove, setS2ShowApprove] = useState(false);
  const [s2Approved, setS2Approved] = useState(false);
  const [s2InputText, setS2InputText] = useState(S2_PREFILL);
  const [s2ChatSent, setS2ChatSent] = useState(false);

  const [running, setRunning] = useState(false);
  const [done, setDone] = useState(false);
  const timersRef = useRef([]);

  // Auto-switch to cockpit panel on mobile when recommendations appear
  useEffect(() => { if (s1ShowRec) setMobilePanel('right'); }, [s1ShowRec]);
  useEffect(() => { if (s2ShowRec) setMobilePanel('right'); }, [s2ShowRec]);

  const clearTimers = () => {
    timersRef.current.forEach(t => clearTimeout(t));
    timersRef.current = [];
  };

  const resetAll = () => {
    clearTimers();
    setS1Messages([]); setS1ShowRec(false); setS1Approved(false);
    setS2Items([]); setS2ShowRec(false); setS2ShowApprove(false); setS2Approved(false);
    setS2InputText(S2_PREFILL); setS2ChatSent(false);
    setRunning(false); setDone(false);
  };

  const switchScenario = (s) => { resetAll(); setScenario(s); setMobilePanel('left'); };

  // S2: fires when Sarah sends her message (typed or auto via Run Demo)
  const handleS2Send = (text) => {
    if (s2ChatSent) return;
    setS2ChatSent(true);
    setS2Items([{ type: 'user_msg', text }]);
    setRunning(true);
    S2_STEPS_AFTER_SEND.forEach(step => {
      const t = setTimeout(() => {
        if (step.type === 'show_rec2')          { setS2ShowRec(true); }
        else if (step.type === 'show_approve2') { setS2ShowApprove(true); setRunning(false); }
        else                                    { setS2Items(prev => [...prev, step]); }
      }, step.delay);
      timersRef.current.push(t);
    });
  };

  const runDemo = () => {
    resetAll();
    setTimeout(() => {
      if (scenario === 1) {
        setRunning(true);
        S1_STEPS.forEach(step => {
          const t = setTimeout(() => {
            if (step.type === 'show_rec') { setS1ShowRec(true); }
            else { setS1Messages(prev => [...prev, step]); }
          }, step.delay);
          timersRef.current.push(t);
        });
        const t = setTimeout(() => setRunning(false), S1_STEPS[S1_STEPS.length - 1].delay + 600);
        timersRef.current.push(t);
      } else {
        handleS2Send(S2_PREFILL);
      }
    }, 50);
  };

  const approved = scenario === 1 ? s1Approved : s2Approved;

  return (
    <div className="min-h-screen bg-shell flex flex-col" style={{ fontFamily: "'DM Sans', sans-serif" }}>
      {/* Nav */}
      <nav className="border-b border-card-border px-4 md:px-6 py-2.5 flex-shrink-0">
        {/* Row 1: logo + run controls */}
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-2.5">
            <div className="w-7 h-7 rounded-lg bg-brand flex items-center justify-center flex-shrink-0">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M7 1L12 4V10L7 13L2 10V4L7 1Z" stroke="white" strokeWidth="1.5" fill="none"/>
                <circle cx="7" cy="7" r="2" fill="white"/>
              </svg>
            </div>
            <span className="text-text-primary font-semibold text-base tracking-tight">Veyant</span>
            <span className="text-text-secondary text-xs font-mono border border-slate-700 rounded px-2 py-0.5 hidden sm:inline">AI Travel Orchestration</span>
          </div>

          <div className="flex items-center gap-2">
            {/* Scenario selector — desktop only in row 1 */}
            <div className="hidden md:flex items-center gap-2 mr-2">
              <button className={`scenario-tab ${scenario === 1 ? 'active' : 'inactive'}`}
                      onClick={() => switchScenario(1)}>
                S1: Calendar Alert
              </button>
              <button className={`scenario-tab ${scenario === 2 ? 'active' : 'inactive'}`}
                      onClick={() => switchScenario(2)}>
                S2: Chat Request
              </button>
            </div>

            {/* Run controls */}
            {(running || done) && !approved && (
              <button onClick={resetAll}
                      className="text-xs text-text-secondary hover:text-text-primary border border-slate-700 rounded-lg px-3 py-1.5 transition-colors">
                Reset
              </button>
            )}
            <button onClick={runDemo} disabled={running}
                    className="text-sm font-medium px-4 py-1.5 rounded-lg transition-all"
                    style={{
                      background: running ? '#334155' : 'linear-gradient(135deg, #2563EB 0%, #1d4ed8 100%)',
                      color: running ? '#64748b' : 'white',
                      cursor: running ? 'not-allowed' : 'pointer',
                      boxShadow: running ? 'none' : '0 0 0 1px rgba(37,99,235,0.4)',
                    }}>
              {running ? 'Running…' : done ? 'Run Again' : 'Run Demo'}
            </button>
          </div>
        </div>

        {/* Row 2: scenario selector — mobile only */}
        <div className="flex md:hidden items-center gap-2 mt-2 pt-2 border-t border-slate-800">
          <button className={`scenario-tab flex-1 text-center ${scenario === 1 ? 'active' : 'inactive'}`}
                  onClick={() => switchScenario(1)}>
            S1: Calendar Alert
          </button>
          <button className={`scenario-tab flex-1 text-center ${scenario === 2 ? 'active' : 'inactive'}`}
                  onClick={() => switchScenario(2)}>
            S2: Chat Request
          </button>
        </div>
      </nav>

      {/* Mobile panel toggle tab bar — hidden on md+ */}
      <div className="flex md:hidden border-b border-card-border flex-shrink-0 bg-card">
        <button
          className={`mobile-tab ${mobilePanel === 'left' ? 'active' : 'inactive'}`}
          onClick={() => setMobilePanel('left')}>
          {scenario === 1 ? 'ACTIVITY FEED' : 'CHAT'}
        </button>
        <button
          className={`mobile-tab ${mobilePanel === 'right' ? 'active' : 'inactive'}`}
          onClick={() => setMobilePanel('right')}>
          TRIP COCKPIT
        </button>
      </div>

      {/* Two-panel layout */}
      <div className="flex flex-col md:flex-row flex-1 overflow-hidden">
        {/* Left */}
        <div className={`md:w-5/12 border-card-border bg-card overflow-hidden flex-col
                         md:border-r md:flex
                         ${mobilePanel === 'left' ? 'flex flex-1' : 'hidden'}`}>
          {scenario === 1
            ? <LeftPanelS1 messages={s1Messages} running={running} confirmed={s1Approved} />
            : <LeftPanelS2 items={s2Items} running={running} confirmed={s2Approved}
                           onSend={handleS2Send} inputText={s2InputText}
                           setInputText={setS2InputText} chatSent={s2ChatSent} />
          }
        </div>
        {/* Right */}
        <div className={`md:w-7/12 bg-shell overflow-hidden flex-col
                         md:flex
                         ${mobilePanel === 'right' ? 'flex flex-1' : 'hidden'}`}>
          {scenario === 1
            ? <RightPanelS1 showRec={s1ShowRec} approved={s1Approved}
                            onApprove={() => { setS1Approved(true); setDone(true); }} />
            : <S2Cockpit showRec={s2ShowRec} showApprove={s2ShowApprove} approved={s2Approved}
                         onApprove={() => { setS2Approved(true); setDone(true); }} />
          }
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
